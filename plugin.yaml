name: hermes-telemetry
version: 0.1.0
description: "OpenTelemetry tracing and metrics for Hermes Agent sessions, LLM calls, and tool invocations."
author: jzb
pip_dependencies:
  - opentelemetry-api>=1.25.0
  - opentelemetry-sdk>=1.25.0
provides_hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
